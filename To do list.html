<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TASK TRACKER</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-container" id="authContainer">
    <div class="auth-box">
      <h2 id="authTitle">Login</h2>

      <input type="text" id="username" placeholder="Enter username" />
      <input type="password" id="password" placeholder="Enter password" />

      <button id="authBtn">Login</button>
      <p id="toggleText">
        Don't have an account?
        <span id="toggleAuth">Register</span>
      </p>
      <p id="authMessage"></p>
    </div>
  </div>

  <div class="app" id="appContainer" style="display: none;">
    <div class="todo-container">
      <div class="top-bar">
        <div>
          <h1>TASK TRACKER</h1>
          <p class="subtitle">Welcome, <span id="welcomeUser"></span></p>
        </div>
        <div class="top-actions">
          <button id="themeToggle" class="theme-toggle">🌙</button>
          <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
      </div>

      <div class="todo-form">
        <input type="text" id="taskInput" placeholder="Enter task title" />
        <input type="datetime-local" id="taskDateTime" />
        <select id="taskPriority">
          <option value="Low">Low Priority</option>
          <option value="Medium" selected>Medium Priority</option>
          <option value="High">High Priority</option>
        </select>
        <button id="addBtn">Add Task</button>
      </div>

      <div class="toolbar">
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <button id="clearCompleted" class="warning-btn">Clear Completed</button>
      </div>

      <ul id="taskList"></ul>

      <div class="bottom-bar">
        <span id="taskCount">0 tasks</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
